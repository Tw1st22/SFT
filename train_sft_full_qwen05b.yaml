### LLaMA-Factory SFT config (full-parameter fine-tuning)
model_name_or_path: Qwen/Qwen2.5-0.5B
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: full

# Data
# Put cleaned JSONL under data/openorca_cleaned.jsonl
# and register dataset name in data/dataset_info.json if required by your LLaMA-Factory version.
dataset: openorca_cleaned
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8

# Output
output_dir: outputs/qwen25_05b_openorca_full
logging_steps: 20
save_steps: 500
eval_steps: 500
plot_loss: true
overwrite_output_dir: true

# Train
per_device_train_batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 1.0e-5
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.01
bf16: true

# Validation (optional)
# val_size: 0.01
# per_device_eval_batch_size: 2
# evaluation_strategy: steps